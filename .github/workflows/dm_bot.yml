name: DM bot listener

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dm-bot-state
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll for DM commands
        env:
          DM_BOT_TOKEN: ${{ secrets.DM_BOT_TOKEN }}
          DM_ADMIN_CHAT_ID: ${{ secrets.DM_ADMIN_CHAT_ID }}
        run: python dm_bot.py

      - name: Commit updated state
        run: |
          git config user.name "dm-bot"
          git config user.email "dm-bot@users.noreply.github.com"
          git add dm_state.json authorized_users.json
          git diff --staged --quiet || git commit -m "Update DM bot state [skip ci]"
          git pull --rebase --autostash
          git push
